<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #000; color: #fff; margin: 0; padding: 20px; touch-action: manipulation; 
        }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        h1 { font-size: 1.2rem; color: #9146ff; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .stats-pill {
            background: #333; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;
        }

        .debug-btn {
            background: #222; border: 1px solid #444; color: #888; padding: 8px; border-radius: 5px;
            font-size: 0.7rem; cursor: pointer;
        }

        .queue-container { display: grid; gap: 10px; }

        .request-card { 
            background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: grab;
        }
        .request-card:active { cursor: grabbing; }

        .song-info { flex: 1; }
        .title { font-size: 1.2rem; font-weight: bold; display: block; }
        .artist { color: #999; font-size: 0.9rem; }
        .user { color: #9146ff; font-size: 0.75rem; margin-top: 5px; font-weight: bold; }

        .controls { display: flex; gap: 8px; align-items: center; }

        .btn-top { background: #444; color: white; border: none; border-radius: 8px; padding: 15px; font-size: 1.2rem; }
        .btn-done { background: #28a745; color: white; border: none; border-radius: 8px; padding: 15px 20px; font-weight: bold; }

        .empty { text-align: center; color: #444; margin-top: 50px; }
        
        /* Dragging styles */
        .sortable-ghost { opacity: 0.3; background: #9146ff; }
    </style>
</head>
<body>

    <div class="header-row">
        <button class="debug-btn" onclick="addDebugSongs()">🛠 DEBUG +10</button>
        <h1>Piano Queue</h1>
        <div class="stats-pill" id="counter">0 Songs</div>
    </div>

    <div id="queue" class="queue-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBwveJdmibNz9N2oKuV9rXYLEoPS1kJEBs",
            authDomain: "pianorequests.firebaseapp.com",
            projectId: "pianorequests",
            storageBucket: "pianorequests.firebasestorage.app",
            messagingSenderId: "873466938525",
            appId: "1:873466938525:web:24bf27361c0844de5b8074"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const queueEl = document.getElementById('queue');
        const counterEl = document.getElementById('counter');

        // 1. Listen for Updates (Sorted by custom 'order' field)
        db.collection("queue").orderBy("order", "asc").onSnapshot(snapshot => {
            counterEl.innerText = `${snapshot.size} Songs`;
            if (snapshot.empty) {
                queueEl.innerHTML = '<div class="empty">Queue is empty</div>';
                return;
            }
            
            queueEl.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'request-card';
                div.setAttribute('data-id', doc.id);
                div.innerHTML = `
                    <div class="song-info">
                        <span class="title">${data.title}</span>
                        <span class="artist">${data.artist}</span>
                        <span class="user">👤 ${data.requestedBy}</span>
                    </div>
                    <div class="controls">
                        <button class="btn-top" onclick="moveToTop('${doc.id}', ${data.order})">⬆️</button>
                        <button class="btn-done" onclick="markPlayed('${doc.id}')">DONE</button>
                    </div>
                `;
                queueEl.appendChild(div);
            });
        });

        // 2. Drag and Drop Setup
        new Sortable(queueEl, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            onEnd: async () => {
                const items = Array.from(queueEl.querySelectorAll('.request-card'));
                const batch = db.batch();
                items.forEach((el, index) => {
                    const ref = db.collection("queue").doc(el.getAttribute('data-id'));
                    batch.update(ref, { order: index });
                });
                await batch.commit();
            }
        });

        // 3. Move to Top
        async function moveToTop(id, currentOrder) {
            const snapshot = await db.collection("queue").orderBy("order", "asc").limit(1).get();
            const firstOrder = snapshot.empty ? 0 : snapshot.docs[0].data().order;
            await db.collection("queue").doc(id).update({ order: firstOrder - 1 });
        }

        // 4. Mark Played
        async function markPlayed(id) {
            await db.collection("queue").doc(id).delete();
        }

        // 5. DEBUG: Add 10 Random Songs
        async function addDebugSongs() {
            const songsSnap = await db.collection("songs").limit(50).get();
            const allSongs = songsSnap.docs.map(d => d.data());
            
            for(let i=0; i<10; i++) {
                const randomSong = allSongs[Math.floor(Math.random() * allSongs.length)];
                await db.collection("queue").add({
                    title: randomSong.title,
                    artist: randomSong.artist,
                    requestedBy: "DebugBot",
                    status: "pending",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    order: Date.now() + i // High number puts them at bottom
                });
            }
        }
    </script>
</body>
</html>
