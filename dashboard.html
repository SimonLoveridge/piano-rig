<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --purple: #bf94ff; /* Slightly lighter for better dark-mode readability */
            --dark-bg: #000000;
            --card-bg: #1a1a1a;
            --green: #2ecc71;
            --text-main: #ffffff;
            --text-dim: #cccccc;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--dark-bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 30px; 
            touch-action: pan-y; 
        }

        .header-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            padding-bottom: 15px;
            border-bottom: 2px solid #222;
        }
        
        h1 { font-size: 1.8rem; color: var(--purple); margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        
        .stats-pill { 
            background: #333; 
            padding: 10px 25px; 
            border-radius: 30px; 
            font-weight: 900; 
            font-size: 1.4rem; 
            color: var(--purple);
        }

        .debug-btn { 
            background: #222; 
            border: 1px solid #444; 
            color: #666; 
            padding: 12px 20px; 
            border-radius: 10px; 
            font-size: 1rem; 
            font-weight: bold;
        }

        .queue-container { display: grid; gap: 20px; }

        .request-card { 
            background: var(--card-bg); 
            border: 2px solid #333; 
            border-radius: 18px; 
            padding: 20px;
            display: flex; 
            align-items: center; 
            gap: 25px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
        }

        /* Large Drag Handle */
        .drag-handle {
            width: 60px; 
            height: 80px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: grab; 
            color: #555; 
            font-size: 2.5rem;
            user-select: none;
        }

        .song-info { flex: 1; min-width: 0; }
        
        .title { 
            font-size: 2.2rem; /* Massive title */
            font-weight: 900; 
            display: block; 
            line-height: 1.1;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .artist { 
            color: var(--text-dim); 
            font-size: 1.6rem; /* Large artist name */
            font-weight: 500;
            display: block; 
        }
        
        .user { 
            color: var(--purple); 
            font-size: 1.2rem; 
            margin-top: 12px; 
            display: block; 
            font-weight: 800;
            text-transform: uppercase;
        }

        .controls { display: flex; gap: 15px; }

        /* Large Action Buttons */
        .btn-top {
            background: #222; 
            color: var(--purple); 
            border: 3px solid var(--purple); 
            border-radius: 15px; 
            width: 80px; 
            height: 80px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer;
        }
        .btn-top svg { width: 45px; height: 45px; fill: currentColor; }

        .btn-done { 
            background: var(--green); 
            color: #000; /* High contrast black text on green */
            border: none; 
            border-radius: 15px; 
            padding: 0 35px; 
            font-weight: 900; 
            font-size: 1.6rem;
            height: 80px; 
            text-transform: uppercase;
            cursor: pointer;
        }

        .empty { text-align: center; color: #444; margin-top: 100px; font-size: 2rem; font-weight: bold; }
        .sortable-ghost { opacity: 0.1; background: var(--purple); }
    </style>
</head>
<body>

    <div class="header-row">
        <button class="debug-btn" onclick="addDebugSongs()">DEBUG +10</button>
        <h1>Piano Requests</h1>
        <div class="stats-pill" id="counter">0</div>
    </div>

    <div id="queue" class="queue-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBwveJdmibNz9N2oKuV9rXYLEoPS1kJEBs",
            authDomain: "pianorequests.firebaseapp.com",
            databaseURL: "https://pianorequests-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "pianorequests",
            storageBucket: "pianorequests.firebasestorage.app",
            messagingSenderId: "873466938525",
            appId: "1:873466938525:web:24bf27361c0844de5b8074"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const queueEl = document.getElementById('queue');
        const counterEl = document.getElementById('counter');

        db.collection("queue").orderBy("order", "asc").onSnapshot(snapshot => {
            counterEl.innerText = snapshot.size;
            if (snapshot.empty) {
                queueEl.innerHTML = '<div class="empty">QUEUE EMPTY</div>';
                return;
            }
            
            queueEl.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'request-card';
                div.setAttribute('data-id', doc.id);
                div.innerHTML = `
                    <div class="drag-handle">☰</div>
                    <div class="song-info">
                        <span class="title">${data.title}</span>
                        <span class="artist">${data.artist}</span>
                        <span class="user">👤 ${data.requestedBy}</span>
                    </div>
                    <div class="controls">
                        <button class="btn-top" onclick="moveToTop('${doc.id}')">
                            <svg viewBox="0 0 24 24"><path d="M7 14l5-5 5 5H7z"/></svg>
                        </button>
                        <button class="btn-done" onclick="markPlayed('${doc.id}')">DONE</button>
                    </div>
                `;
                queueEl.appendChild(div);
            });
        });

        new Sortable(queueEl, {
            handle: '.drag-handle',
            animation: 200,
            ghostClass: 'sortable-ghost',
            onEnd: reorderAll
        });

        async function reorderAll() {
            const items = Array.from(queueEl.querySelectorAll('.request-card'));
            const batch = db.batch();
            items.forEach((el, index) => {
                const ref = db.collection("queue").doc(el.getAttribute('data-id'));
                batch.update(ref, { order: index });
            });
            await batch.commit();
        }

        async function moveToTop(id) {
            const items = Array.from(queueEl.querySelectorAll('.request-card'));
            const targetId = id;
            const filteredItems = items.filter(el => el.getAttribute('data-id') !== targetId);
            const targetEl = items.find(el => el.getAttribute('data-id') === targetId);
            const newOrder = [targetEl, ...filteredItems];

            const batch = db.batch();
            newOrder.forEach((el, index) => {
                const ref = db.collection("queue").doc(el.getAttribute('data-id'));
                batch.update(ref, { order: index });
            });
            await batch.commit();
        }

        async function markPlayed(id) {
            await db.collection("queue").doc(id).delete();
        }

        async function addDebugSongs() {
            const songsSnap = await db.collection("songs").limit(50).get();
            const allSongs = songsSnap.docs.map(d => d.data());
            if (allSongs.length === 0) return;
            
            const batch = db.batch();
            const baseOrder = Date.now();
            for(let i=0; i<10; i++) {
                const randomSong = allSongs[Math.floor(Math.random() * allSongs.length)];
                const ref = db.collection("queue").doc();
                batch.set(ref, {
                    title: randomSong.title,
                    artist: randomSong.artist,
                    requestedBy: "DebugBot",
                    status: "pending",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    order: baseOrder + i
                });
            }
            await batch.commit();
        }
    </script>
</body>
</html>
