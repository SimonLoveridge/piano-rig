<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Dashboard</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #000; 
            color: #fff; 
            margin: 0; 
            padding: 20px; 
            touch-action: manipulation; 
        }
        h1 { 
            font-size: 1.5rem; 
            text-align: center; 
            color: #6441a5; /* Twitch Purple */
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .queue-container { 
            display: grid; 
            gap: 15px; 
        }
        .request-card { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            border-radius: 12px; 
            padding: 20px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .song-info { 
            flex: 1; 
            padding-right: 15px; 
        }
        .title { 
            font-size: 1.4rem; 
            font-weight: 800; 
            display: block; 
            color: #fff; 
            margin-bottom: 4px; 
        }
        .artist { 
            color: #bbb; 
            font-size: 1.1rem; 
            display: block; 
        }
        .user { 
            color: #9146ff; 
            font-size: 0.9rem; 
            margin-top: 10px; 
            display: block; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        
        .btn-done { 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 10px;
            padding: 25px 30px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            text-transform: uppercase;
            min-width: 120px; 
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-done:active { 
            background: #1e7e34; 
            transform: scale(0.92); 
        }
        .empty { 
            text-align: center; 
            color: #666; 
            margin-top: 60px; 
            font-size: 1.2rem; 
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>🎹 Piano Queue</h1>
    <div id="queue" class="queue-container">
        <div class="empty">Connecting to Firestore...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // Your specific Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBwveJdmibNz9N2oKuV9rXYLEoPS1kJEBs",
            authDomain: "pianorequests.firebaseapp.com",
            databaseURL: "https://pianorequests-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "pianorequests",
            storageBucket: "pianorequests.firebasestorage.app",
            messagingSenderId: "873466938525",
            appId: "1:873466938525:web:24bf27361c0844de5b8074",
            measurementId: "G-FF5MGZ2RJX"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Listen for Real-time Updates
        db.collection("queue")
          .orderBy("timestamp", "asc")
          .onSnapshot((snapshot) => {
            const container = document.getElementById('queue');
            
            if (snapshot.empty) {
                container.innerHTML = '<div class="empty">No active requests.</div>';
                return;
            }

            container.innerHTML = ""; // Clear loader/old list
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'request-card';
                div.innerHTML = `
                    <div class="song-info">
                        <span class="title">${data.title}</span>
                        <span class="artist">${data.artist}</span>
                        <span class="user">👤 ${data.requestedBy}</span>
                    </div>
                    <button class="btn-done" onclick="markPlayed('${doc.id}')">DONE</button>
                `;
                container.appendChild(div);
            });
        }, (error) => {
            console.error("Snapshot error:", error);
            document.getElementById('queue').innerHTML = '<div class="empty">Check Firebase Rules or Connection.</div>';
        });

        // Function to remove song from queue
        async function markPlayed(id) {
            try { 
                await db.collection("queue").doc(id).delete(); 
            } catch (e) { 
                console.error("Error deleting document:", e); 
            }
        }
    </script>
</body>
</html>
