<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --purple: #9146ff;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --green: #28a745;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--dark-bg); color: #fff; margin: 0; padding: 20px; 
            touch-action: pan-y; /* Allows normal scrolling */
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.1rem; color: var(--purple); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .stats-pill { background: #333; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        .debug-btn { background: #222; border: 1px solid #444; color: #888; padding: 10px; border-radius: 8px; font-size: 0.75rem; }

        .queue-container { display: grid; gap: 12px; }

        .request-card { 
            background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 12px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* The Drag Handle */
        .drag-handle {
            width: 40px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            cursor: grab; color: #444; font-size: 1.5rem;
        }

        .song-info { flex: 1; min-width: 0; }
        .title { font-size: 1.2rem; font-weight: 800; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist { color: #aaa; font-size: 1rem; display: block; }
        .user { color: var(--purple); font-size: 0.8rem; margin-top: 4px; font-weight: bold; }

        .controls { display: flex; gap: 10px; }

        /* Fancy Move to Top Button */
        .btn-top {
            background: #2a2a2a; color: var(--purple); border: 2px solid var(--purple); 
            border-radius: 10px; width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-top svg { width: 24px; height: 24px; fill: currentColor; }
        .btn-top:active { background: var(--purple); color: white; }

        .btn-done { 
            background: var(--green); color: white; border: none; border-radius: 10px; 
            padding: 0 25px; font-weight: bold; height: 55px; text-transform: uppercase;
        }

        .empty { text-align: center; color: #444; margin-top: 50px; }
        .sortable-ghost { opacity: 0.1; background: var(--purple); }
    </style>
</head>
<body>

    <div class="header-row">
        <button class="debug-btn" onclick="addDebugSongs()">🛠 DEBUG +10</button>
        <h1>Piano Queue</h1>
        <div class="stats-pill" id="counter">0 Songs</div>
    </div>

    <div id="queue" class="queue-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBwveJdmibNz9N2oKuV9rXYLEoPS1kJEBs",
            authDomain: "pianorequests.firebaseapp.com",
            databaseURL: "https://pianorequests-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "pianorequests",
            storageBucket: "pianorequests.firebasestorage.app",
            messagingSenderId: "873466938525",
            appId: "1:873466938525:web:24bf27361c0844de5b8074"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const queueEl = document.getElementById('queue');
        const counterEl = document.getElementById('counter');

        db.collection("queue").orderBy("order", "asc").onSnapshot(snapshot => {
            counterEl.innerText = `${snapshot.size} Songs`;
            if (snapshot.empty) {
                queueEl.innerHTML = '<div class="empty">Queue is empty</div>';
                return;
            }
            
            queueEl.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'request-card';
                div.setAttribute('data-id', doc.id);
                div.innerHTML = `
                    <div class="drag-handle">☰</div>
                    <div class="song-info">
                        <span class="title">${data.title}</span>
                        <span class="artist">${data.artist}</span>
                        <span class="user">👤 ${data.requestedBy}</span>
                    </div>
                    <div class="controls">
                        <button class="btn-top" onclick="moveToTop('${doc.id}')" title="Move to Top">
                            <svg viewBox="0 0 24 24"><path d="M7 14l5-5 5 5H7z"/></svg>
                        </button>
                        <button class="btn-done" onclick="markPlayed('${doc.id}')">DONE</button>
                    </div>
                `;
                queueEl.appendChild(div);
            });
        });

        // Initialize Sortable with Handle
        new Sortable(queueEl, {
            handle: '.drag-handle', // ONLY drag via the ☰ icon
            animation: 200,
            ghostClass: 'sortable-ghost',
            onEnd: reorderAll
        });

        async function reorderAll() {
            const items = Array.from(queueEl.querySelectorAll('.request-card'));
            const batch = db.batch();
            items.forEach((el, index) => {
                const ref = db.collection("queue").doc(el.getAttribute('data-id'));
                batch.update(ref, { order: index });
            });
            await batch.commit();
        }

        async function moveToTop(id) {
            const items = Array.from(queueEl.querySelectorAll('.request-card'));
            const targetId = id;
            
            // Move target to index 0 in the local array
            const filteredItems = items.filter(el => el.getAttribute('data-id') !== targetId);
            const targetEl = items.find(el => el.getAttribute('data-id') === targetId);
            const newOrder = [targetEl, ...filteredItems];

            const batch = db.batch();
            newOrder.forEach((el, index) => {
                const ref = db.collection("queue").doc(el.getAttribute('data-id'));
                batch.update(ref, { order: index });
            });
            await batch.commit();
        }

        async function markPlayed(id) {
            await db.collection("queue").doc(id).delete();
        }

        async function addDebugSongs() {
            const songsSnap = await db.collection("songs").limit(50).get();
            const allSongs = songsSnap.docs.map(d => d.data());
            if (allSongs.length === 0) return alert("Library empty!");
            
            const batch = db.batch();
            const baseOrder = Date.now();
            for(let i=0; i<10; i++) {
                const randomSong = allSongs[Math.floor(Math.random() * allSongs.length)];
                const ref = db.collection("queue").doc();
                batch.set(ref, {
                    title: randomSong.title,
                    artist: randomSong.artist,
                    requestedBy: "DebugBot",
                    status: "pending",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    order: baseOrder + i
                });
            }
            await batch.commit();
        }
    </script>
</body>
</html>
